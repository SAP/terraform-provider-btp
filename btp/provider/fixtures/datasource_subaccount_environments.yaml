technical name once.\",\"minLength\":1,\"title\":\"Name\",\"type\":\"string\"}},\"type\":\"object\"},\"type\":\"array\",\"uniqueItems\":true}},\"title\":\"Custom\",\"type\":\"object\"}],\"type\":\"object\"},\"name\":{\"_BTPdefaultTemplate\":{\"elements\":[\"saSubdomain\"]},\"maxLength\":64,\"minLength\":1,\"pattern\":\"^[a-zA-Z0-9-]*$\",\"title\":\"Cluster Name\",\"type\":\"string\"},\"networking\":{\"description\":\"Networking configuration. These values are immutable and cannot be updated later. All provided CIDR ranges must not overlap one another.\",\"properties\":{\"dualStack\":{\"description\":\"Enable dual-stack networking (IPv4 and IPv6). The Kyma Istio module does not support dual-stack mode. For more information, see \\u003ca href\\u003dhttps://help.sap.com/docs/btp/sap-business-technology-platform-internal/kyma-runtime-with-dual-stack-support?version\\u003dInternal\\u0026state\\u003dDRAFT\\u003edocumentation\\u003c/a\\u003e.\",\"title\":\"Enable dual stack (Istio module doesn\\u0027t support dual stack)\",\"type\":\"boolean\"},\"nodes\":{\"default\":\"10.250.0.0/16\",\"description\":\"CIDR range for Nodes, must not overlap with the following CIDRs: 10.243.128.0/17, 10.242.0.0/16, 10.243.0.0/17, 10.64.0.0/11, 10.254.0.0/16, 10.243.0.0/16, 192.168.123.0/24, 240.0.0.0/8\",\"title\":\"CIDR range for Nodes\",\"type\":\"string\"},\"pods\":{\"default\":\"10.96.0.0/13\",\"description\":\"CIDR range for Pods, must not overlap with the following CIDRs: 10.243.128.0/17, 10.242.0.0/16, 10.243.0.0/17, 10.64.0.0/11, 10.254.0.0/16, 10.243.0.0/16, 192.168.123.0/24, 240.0.0.0/8\",\"title\":\"CIDR range for Pods\",\"type\":\"string\"},\"services\":{\"default\":\"10.104.0.0/13\",\"description\":\"CIDR range for Services, must not overlap with the following CIDRs: 10.243.128.0/17, 10.242.0.0/16, 10.243.0.0/17, 10.64.0.0/11, 10.254.0.0/16, 10.243.0.0/16, 192.168.123.0/24, 240.0.0.0/8\",\"title\":\"CIDR range for Services\",\"type\":\"string\"}},\"required\":[\"nodes\"],\"type