onsist of lowercase alphanumeric characters or \\u0027-\\u0027, must start and end with an alphanumeric character, and can be a maximum of 15 characters in length. Do not use the name “cpu-worker-0” because it\\u0027s reserved for the Kyma worker node pool.\",\"maxLength\":15,\"minLength\":1,\"pattern\":\"^(?!cpu-worker-0$)[a-z0-9]([-a-z0-9]*[a-z0-9])?$\",\"type\":\"string\"},\"taints\":{\"description\":\"Specifies taints for the worker node pool. With the taints added, a node can repel sets of Pods with no matching tolerations.\",\"items\":{\"_controlsOrder\":[\"key\",\"value\",\"effect\"],\"properties\":{\"effect\":{\"_enumDisplayName\":{\"NoExecute\":\"NoExecute\",\"NoSchedule\":\"NoSchedule\",\"PreferNoSchedule\":\"PreferNoSchedule\"},\"description\":\"Specifies the taint effect.\",\"enum\":[\"NoSchedule\",\"PreferNoSchedule\",\"NoExecute\"],\"type\":\"string\"},\"key\":{\"description\":\"Specifies the taint key.\",\"minLength\":1,\"type\":\"string\"},\"value\":{\"description\":\"Specifies the taint value.\",\"type\":\"string\"}},\"required\":[\"key\",\"effect\"],\"type\":\"object\"},\"type\":\"array\"}},\"required\":[\"name\",\"machineType\",\"haZones\",\"autoScalerMin\",\"autoScalerMax\"],\"type\":\"object\"},\"type\":\"array\",\"uniqueItems\":true},\"administrators\":{\"description\":\"Specifies the list of runtime administrators.\",\"items\":{\"type\":\"string\"},\"title\":\"Administrators\",\"type\":\"array\"},\"autoScalerMax\":{\"default\":20,\"description\":\"Specifies the maximum number of virtual machines to create\",\"maximum\":300,\"minimum\":3,\"type\":\"integer\"},\"autoScalerMin\":{\"default\":3,\"description\":\"Specifies the minimum number of virtual machines to create\",\"maximum\":300,\"minimum\":3,\"type\":\"integer\"},\"colocateControlPlane\":{\"default\":false,\"description\":\"If set to true, the control plane is placed in the same region as the selected region from the Region field. Check regions supporting the feature on this \\u003ca hre