rge\":\"mi.8xlarge (32vCPU, 128GB RAM, 158Gi volume)\",\"mi.large\":\"mi.large (2vCPU, 8GB RAM, 80Gi volume)\",\"mi.xlarge\":\"mi.xlarge (4vCPU, 16GB RAM, 80Gi volume)\"},\"description\":\"Specifies the type of the virtual machine.\",\"enum\":[\"mi.large\",\"mi.xlarge\",\"mi.2xlarge\",\"mi.4xlarge\",\"mi.8xlarge\",\"mi.12xlarge\",\"mi.16xlarge\",\"m6i.large\",\"m6i.xlarge\",\"m6i.2xlarge\",\"m6i.4xlarge\",\"m6i.8xlarge\",\"m6i.12xlarge\",\"m6i.16xlarge\",\"m5.large\",\"m5.xlarge\",\"m5.2xlarge\",\"m5.4xlarge\",\"m5.8xlarge\",\"m5.12xlarge\",\"m5.16xlarge\"],\"type\":\"string\"},\"modules\":{\"description\":\"Use default modules or provide your custom list of modules. Provide an empty custom list of modules if you don’t want any modules enabled.\",\"oneOf\":[{\"_controlsOrder\":[\"default\",\"channel\"],\"additionalProperties\":false,\"description\":\"Default modules\",\"properties\":{\"channel\":{\"_enumDisplayName\":{\"fast\":\"Fast - latest version\",\"regular\":\"Regular - default version\"},\"default\":\"fast\",\"description\":\"For the default modules, specifies your preferred default release channel: regular or fast. For details, see \\u003ca href\\u003dhttps://help.sap.com/docs/btp/sap-business-technology-platform/provisioning-and-update-parameters-in-kyma-environment?locale\\u003den-US\\u0026q\\u003dIPv#modules\\u003eModules\\u003c/a\\u003e.\",\"enum\":[\"regular\",\"fast\"],\"title\":\"Default Module Channel\",\"type\":\"string\"},\"default\":{\"default\":true,\"description\":\"Check the default modules in the \\u003ca href\\u003dhttps://help.sap.com/docs/btp/sap-business-technology-platform/kyma-modules?version\\u003dCloud\\u003edefault modules table\\u003c/a\\u003e.\",\"readOnly\":true,\"title\":\"Use Default\",\"type\":\"boolean\"}},\"title\":\"Default\",\"type\":\"object\"},{\"_controlsOrder\":[\"channel\",\"list\"],\"additionalProperties\":false,\"description\":\"Define custom module list\",\"properties\":{\"channel\":{\"_enumDisplayName\":{\"fast\":\"