        body: '{"availableEnvironments":[{"serviceName":"cloudfoundry","serviceDisplayName":"Cloud Foundry Runtime","serviceImageUrl":"data:image/png;base64,\u003d\u003d","serviceDescription":"An efficient model for cloud-native application delivery","serviceLongDescription":"The SAP BTP, Cloud Foundry runtime lets you develop polyglot cloud-native applications and run them on the SAP BTP Cloud Foundry environment.","serviceDocumentationUrl":"https://help.sap.com/viewer/65de2977205c403bbc107264b8eccf4b/Cloud/en-US/9c7092c7b7ae4d49bc8ae35fdd0e0b18.html#loio9c7092c7b7ae4d49bc8ae35fdd0e0b18","serviceSupportUrl":"https://help.sap.com/viewer/65de2977205c403bbc107264b8eccf4b/Cloud/en-US/5dd739823b824b539eee47b7860a00be.html","planName":"standard","planUpdatable":true,"description":"Create an org in your Cloud Foundry environment to start developing polyglot cloud-native applications.","environmentType":"cloudfoundry","availabilityLevel":"LIMITED","landscapeLabel":"cf-eu12-001","createSchema":"{\"parameters\":{\"schema\":\"http://json-schema.org/draft-07/schema#\",\"_show_form_view\":true,\"type\":\"object\",\"properties\":{\"instance_name\":{\"title\":\"Org Name\",\"description\":\"Cloud Foundry organization name\",\"type\":\"string\",\"minLength\":1,\"_BTPdefaultTemplate\":{\"elements\":[\"gaDisplayName\",\"saSubdomain\"],\"separator\":\"_\"}}},\"required\":[\"instance_name\"]}}","allowAdditionalEnvironmentInstance":false},{"serviceName":"kymaruntime","serviceDisplayName":"Kyma Environment","serviceImageUrl":"data:image/svg+xml;base64,\u003d","serviceDescription":"Kyma environment is a runtime you can use to build cloud-native Kubernetes-based applications by using microservices and serverless functions.","serviceLongDescription":"Kyma environment is a runtime you can use to build cloud-native Kubernetes-based applications by using microservices and serverless functions.","serviceDocumentationUrl":"https://help.sap.com/docs/btp/sap-business-technology-platform-internal/p