name: Regression Test - Terraform Provider

# Idea:
# 1. Setup infrastructure with stable release of the provider in the live environment
# 2. Switch to a local build of the provider
# 3. Execute a terraform plan and check for deviations
# 4. Destroy the infrastructure
# 5. If deviation was detected create/update an issue

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      PATH_TO_TFSCRIPT:
        description: 'Path to the terraform script to execute the regression test with'
        required: true
        type: string

env:
  PATH_TO_TFSCRIPT: ${{ inputs.PATH_TO_TFSCRIPT }}
  DEV_OVERRIDE: 'assets/provider-config-ghaction.txt'
  TEMP_PLAN_OUTPUT : 'plan-output.tfplan'

permissions:
  contents: read
  issues: write

jobs:
  execute_regression_test:
    name: Regression Test
    runs-on: ubuntu-latest

    steps:
    - name: Check out Git repository
      id: checkout_repo
      uses: actions/checkout@v6

    - name: Setup Terraform
      id : setup_terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false
        terraform_version: latest

    - name: Terraform Init with stable provider
      id: terraform_init
      shell: bash
      run: |
        terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} init -no-color

    - name: Terraform Plan with stable provider
      id: terraform_plan_stable
      shell: bash
      run: |
        set +e

        export BTP_USERNAME=${{ secrets.BTP_USERNAME }}
        export BTP_PASSWORD=${{ secrets.BTP_PASSWORD }}
        export BTP_IDP=${{ secrets.CANARY_BTP_IDP }}

        terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} plan \
          -var globalaccount=${{ secrets.CANARY_GLOBALACCOUNT }} \
          -var-file=canary.tfvars \
          -out=${{ env.TEMP_PLAN_OUTPUT }} \
          -no-color \
          -detailed-exitcode

        EXIT_CODE=$?
        echo "exitcode=$EXIT_CODE" >> $GITHUB_OUTPUT

        if [ $EXIT_CODE -eq 1 ]; then
          echo "Error during terraform plan execution"
          exit 1
        elif [ $EXIT_CODE -eq 2 ]; then
          echo "Changes detected in terraform plan"
        else
          echo "No changes detected in terraform plan"
        fi

    - name: Terraform Apply with stable provider
      if: steps.terraform_plan_stable.outputs.exitcode == '0' || steps.terraform_plan_stable.outputs.exitcode == '2'
      id: terraform_apply_stable
      shell: bash
      run: |
        set +e

        export BTP_USERNAME=${{ secrets.BTP_USERNAME }}
        export BTP_PASSWORD=${{ secrets.BTP_PASSWORD }}
        export BTP_IDP=${{ secrets.CANARY_BTP_IDP }}

        MAX_RETRIES=3
        RETRY_DELAY=10

        echo "attempts=0" >> $GITHUB_OUTPUT

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Terraform apply attempt $i..."

          terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} apply \
            -var globalaccount=${{ secrets.CANARY_GLOBALACCOUNT }} \
            -var-file=canary.tfvars \
            -auto-approve \
            -no-color

          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "Terraform apply succeeded"
            echo "attempts=$i" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Terraform apply failed with exit code $EXIT_CODE"

          if [ $i -lt $MAX_RETRIES ]; then
            echo "Retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
          fi
        done

        echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
        echo "Terraform apply failed after retries"
        exit 1

    - name: Setup Go
      uses: actions/setup-go@v6.4.0
      with:
        go-version-file: 'go.mod'
        cache: false

    - name: Install local Terraform provider
      id: build_provider
      shell: bash
      run: |
        go mod tidy && make install

    - name: Remove init data and place override
      id: set_to_override
      shell: bash
      run: |
        rm -rf ${{ env.PATH_TO_TFSCRIPT }}/.terraform
        rm -rf ${{ env.PATH_TO_TFSCRIPT }}/.terraform.lock.hcl 
        cp ${{ env.DEV_OVERRIDE }} ~/.terraformrc

    - name: Check for deviations in terraform plan
      id: execute_deviation_check
      shell: bash
      run: |
        export BTP_USERNAME=${{ secrets.BTP_USERNAME }}
        export BTP_PASSWORD=${{ secrets.BTP_PASSWORD }}
        export BTP_IDP=${{ secrets.CANARY_BTP_IDP }}

        terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} plan \
          -var globalaccount=${{ secrets.CANARY_GLOBALACCOUNT }} \
          -var-file=canary.tfvars \
          -no-color \
          -detailed-exitcode


    - name: Remove init data and override
      if: always()
      id: remove_override
      shell: bash
      run: |
        rm -rf ${{ env.PATH_TO_TFSCRIPT }}/.terraform
        rm -rf ${{ env.PATH_TO_TFSCRIPT }}/.terraform.lock.hcl 
        cp ${{ env.DEV_OVERRIDE }} ~/.terraformrc

    - name: Terraform Init with stable provider
      if: always()
      id: terraform_reinit
      shell: bash
      run: |
        terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} init -upgrade -no-color

    - name: Terraform Destroy with stable provider
      if: always()
      id: terraform_destroy_stable
      shell: bash
      run: |
        set +e
        
        export BTP_USERNAME=${{ secrets.BTP_USERNAME }}
        export BTP_PASSWORD=${{ secrets.BTP_PASSWORD }}
        export BTP_IDP=${{ secrets.CANARY_BTP_IDP }}

        MAX_RETRIES=3
        RETRY_DELAY=10

        echo "attempts=0" >> $GITHUB_OUTPUT

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Terraform destroy attempt $i..."

          terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} destroy \
            -var globalaccount=${{ secrets.CANARY_GLOBALACCOUNT }} \
            -var-file=canary.tfvars \
            -auto-approve \
            -no-color

          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "Terraform destroy succeeded"
            echo "attempts=$i" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Terraform destroy failed with exit code $EXIT_CODE"

          if [ $i -lt $MAX_RETRIES ]; then
            echo "Retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
          fi
        done

        echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
        echo "Terraform destroy failed after retries"
        exit 1

    - name: State deviation - find existing issue for deviation
      id: find_deviation_issue
      uses: micalevisk/last-issue-action@v2
      if: ${{ steps.execute_deviation_check.outcome == 'failure' }}
      with:
        state: open
        labels: |
          state deviation
          automated issue

    - name: State deviation - create or update issue
      uses: peter-evans/create-issue-from-file@v6
      if: ${{ steps.execute_deviation_check.outcome == 'failure' }}
      with:
        title: Regression Test Failed - State deviation found
        # If issue number is empty a new issue gets created
        issue-number: ${{ steps.find_deviation_issue.outputs.issue-number }}
        content-filepath: ${{ env.TEMP_PLAN_OUTPUT }}
        labels: state deviation, automated issue, canary, terraform

    - name: Cleanup plan output
      id: execute_plan_cleanup
      if: always()
      shell: bash
      run: |
        rm -rf ${{ env.TEMP_PLAN_OUTPUT }}

    - name: State deviation - Set run to failed
      if: ${{ steps.execute_deviation_check.outcome == 'failure' }}
      uses: actions/github-script@v9
      with:
        script: |
            core.setFailed('A state deviation was detected!')
