# Terraform Provider release workflow.
name: Terraform Provider Release

# This GitHub action creates a release when a tag that matches the pattern
# "v*" (e.g. v0.1.0) is created.
on:
  push:
    tags:
      - 'v*'

# Releases need permissions to read and write the repository contents.
# GitHub considers creating releases and uploading assets as writing contents.
permissions:
  contents: write
  issues: write

jobs:
  call-workflow-test:
    uses: ./.github/workflows/test.yml
    secrets: inherit
  call-workflow-regression-test:
    uses: ./.github/workflows/schema-regression-test.yml
    secrets: inherit
    permissions:
      contents: read
      issues: write
    with:
      path_to_tfscript: tests/regression-test
  call-workflow-binary-integrity-check:
    uses: ./.github/workflows/binary-integrity-check.yml
    secrets: inherit
    with:
      RELEASE_VERSION: ${{ replace(github.ref_name, 'v', '') }} # Pass the tag name (without 'v' prefix) as the release version to the binary integrity check workflow.
  goreleaser:
    runs-on: ubuntu-latest
    needs:
      - call-workflow-test
      - call-workflow-regression-test
      - call-workflow-binary-integrity-check
    steps:
      - uses: actions/checkout@v6
        with:
          # Allow goreleaser to access older tag information.
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: false
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: v2.14.3
          args: release --clean
        env:
          # GitHub sets the GITHUB_TOKEN secret automatically.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
