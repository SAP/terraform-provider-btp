name: Live Integration Test (Stable) - Terraform Provider

# Idea: 
# 1. Build the provider from the stable version using terraform init
# 2. Setup Terraform
# 3. Execute the integration test script on live landscape
# 4. All changes must apply
# 5. Destroy the infrastructure


on:
  workflow_dispatch:
  workflow_call:

env:
  PATH_TO_TFSCRIPT: 'tests/integration-test'
  TEMP_PLAN_OUTPUT : 'plan-output.tfplan'

permissions:
  contents: read
  issues: write

jobs:
  test:
    name: Live Integration Test with stable provider
    runs-on: ubuntu-latest

    steps:
    - name: Check out Git repository
      id: checkout_repo
      uses: actions/checkout@v6

    - name: Setup Terraform
      id : setup_terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_wrapper: false
        terraform_version: latest

    - name: Terraform Init with stable provider
      id: terraform_init
      shell: bash
      run: |
        terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} init -no-color
    
    - name: Terraform Plan with stable provider
      id: terraform_plan_stable
      shell: bash
      run: |
        set +e

        export BTP_USERNAME=${{ secrets.BTP_USERNAME }}
        export BTP_PASSWORD=${{ secrets.BTP_PASSWORD }}
        export BTP_IDP=${{ secrets.LIVE_BTP_IDP }}

        terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} plan \
          -var globalaccount=${{ secrets.LIVE_GLOBALACCOUNT }} \
          -var-file=live.tfvars \
          -out=${{ env.TEMP_PLAN_OUTPUT }} \
          -no-color \
          -detailed-exitcode

        EXIT_CODE=$?
        echo "exitcode=$EXIT_CODE" >> $GITHUB_OUTPUT

        if [ $EXIT_CODE -eq 1 ]; then
          echo "Error during terraform plan execution"
          exit 1
        elif [ $EXIT_CODE -eq 2 ]; then
          echo "Changes detected in terraform plan"
        else
          echo "No changes detected in terraform plan"
        fi

    - name: Terraform Apply with stable provider
      if: steps.terraform_plan_stable.outputs.exitcode == '0' || steps.terraform_plan_stable.outputs.exitcode == '2'
      id: terraform_apply_stable
      shell: bash
      run: |
        set +e

        export BTP_USERNAME=${{ secrets.BTP_USERNAME }}
        export BTP_PASSWORD=${{ secrets.BTP_PASSWORD }}
        export BTP_IDP=${{ secrets.LIVE_BTP_IDP }}

        MAX_RETRIES=3
        RETRY_DELAY=10

        echo "attempts=0" >> $GITHUB_OUTPUT

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Terraform apply attempt $i..."

          terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} apply \
            -auto-approve \
            -no-color \
            ${{ env.TEMP_PLAN_OUTPUT }}

          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "Terraform apply succeeded"
            echo "attempts=$i" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Terraform apply failed with exit code $EXIT_CODE"

          if [ $i -lt $MAX_RETRIES ]; then
            echo "Retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
          fi
        done

        echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
        echo "Terraform apply failed after retries"
        exit 1
    
    - name: Terraform Destroy with stable provider
      if: always()
      id: terraform_destroy_stable
      shell: bash
      run: |
        set +e
        
        export BTP_USERNAME=${{ secrets.BTP_USERNAME }}
        export BTP_PASSWORD=${{ secrets.BTP_PASSWORD }}
        export BTP_IDP=${{ secrets.LIVE_BTP_IDP }}

        MAX_RETRIES=3
        RETRY_DELAY=10

        echo "attempts=0" >> $GITHUB_OUTPUT

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Terraform destroy attempt $i..."

          terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} destroy \
            -var globalaccount=${{ secrets.LIVE_GLOBALACCOUNT }} \
            -var-file=live.tfvars \
            -auto-approve \
            -no-color

          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "Terraform destroy succeeded"
            echo "attempts=$i" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Terraform destroy failed with exit code $EXIT_CODE"

          if [ $i -lt $MAX_RETRIES ]; then
            echo "Retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
          fi
        done

        echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
        echo "Terraform destroy failed after retries"
        exit 1