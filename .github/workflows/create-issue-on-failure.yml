name: Create Issue on Test Failure

on:
  workflow_call:
    inputs:
      workflow_name:
        required: true
        type: string
      job_results:
        required: true
        type: string
      labels:
        required: true
        type: string
      test_type:
        required: true
        type: string # "integration" or "regression"


permissions:
  issues: write
  contents: read

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create or Update failure issue
        uses: actions/github-script@v9
        with:
          script: |
            const results = `${{ inputs.job_results }}`;
            const testType = `${{ inputs.test_type }}`.toLowerCase();

            // Skip if no failure
            if (!results.includes("failure")) {
              console.log("No failures detected, skipping issue creation.");
              return;
            }

            const labels = JSON.parse(`${{ inputs.labels }}`);
            const workflowName = `${{ inputs.workflow_name }}`;
            const repo = context.repo;
            const capitalizedType = testType.charAt(0).toUpperCase() + testType.slice(1);

            const title = `${workflowName} - ${capitalizedType} Test Failure`;

            const now = new Date().toISOString();

            const body = `
            ## ${capitalizedType} Test Failed

            **Workflow Group:** ${{ inputs.workflow_name }}

            **Test Type:** ${capitalizedType}

            **Results:**
            ${results}

            **Run URL:**
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            **Triggered by:** @${context.actor}

            **Timestamp:** ${now}
            `;

            // Fetch open issues
            const searchQuery = `repo:${repo.owner}/${repo.repo} is:issue is:open in:title "${title}"`;

            const searchResult = await github.rest.search.issuesAndPullRequests({
              q: searchQuery,
              per_page: 10
            });

            const existingIssue = searchResult.data.items.find(item => !item.pull_request);

            if (existingIssue) {
              console.log(`Updating existing issue #${existingIssue.number}`);

              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: existingIssue.number,
                body: body
              });

            } else {
              console.log("No existing issue found, creating a new one");

              // Add workflow-specific label for future filtering
              const workflowLabel = workflowName
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '') + "-failure";

              await github.rest.issues.create({
                owner: repo.owner,
                repo: repo.repo,
                title,
                body,
                labels: [
                  ...labels,
                  `${testType}-test-failure`,
                  workflowLabel
                ]
              });
            }