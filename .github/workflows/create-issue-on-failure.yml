name: Create Issue on Test Failure

on:
  workflow_call:
    inputs:
      workflow_name:
        required: true
        type: string
      job_results:
        required: true
        type: string
      labels:
        required: true
        type: string
      test_type:
        required: true
        type: string # "integration" or "regression"


permissions:
  issues: write
  contents: read

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create or Update failure issue
        uses: actions/github-script@v9
        with:
          script: |
            const results = `${{ inputs.job_results }}`;
            const testType = `${{ inputs.test_type }}`.toLowerCase();

            // Skip if no failure
            if (!results.includes("failure")) {
              console.log("No failures detected, skipping issue creation.");
              return;
            }

            const labels = JSON.parse(`${{ inputs.labels }}`);
            const workflowName = `${{ inputs.workflow_name }}`;
            const repo = context.repo;
            const capitalizedType = testType.charAt(0).toUpperCase() + testType.slice(1);

            const title = `${workflowName} - ${capitalizedType} Test Failure`;

            const now = new Date().toISOString();

            const body = `
            ## ${capitalizedType} Test Failed

            **Workflow Group:** ${{ inputs.workflow_name }}

            **Test Type:** ${capitalizedType}

            **Results:**
            ${results}

            **Run URL:**
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            **Triggered by:** @${context.actor}

            **Timestamp:** ${now}
            `;

            // Fetch open issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: repo.owner,
              repo: repo.repo,
              state: "open",
              per_page: 100
            });

            // Try finding existing issue by title OR label
            const existingIssue = issues.find(issue =>
              issue.title === title ||
              issue.labels.some(l => l.name === `${testType}-test-failure`)
            );

            if (existingIssue) {
              console.log(`Updating existing issue #${existingIssue.number}`);

              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: existingIssue.number,
                body: body
              });

            } else {
              console.log("No existing issue found, creating a new one");

              await github.rest.issues.create({
                owner: repo.owner,
                repo: repo.repo,
                title,
                body,
                labels: [...labels, `${testType}-test-failure`]
              });
            }