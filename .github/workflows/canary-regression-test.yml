name: Daily Canary Regression Test - Terraform Provider

on:
  schedule:
    - cron: '0 5 * * *'  # Runs every day at 10:30 AM IST (5:00 AM UTC)
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  
jobs:
  regression_v1_10_0:
    name: Regression Test (v1.10.0)
    uses: ./.github/workflows/schema-regression-test.yml
    with:
      path_to_tfscript: tests/regression-test
    secrets: inherit

  regression_v1_21_3:
    name: Regression Test (v1.21.3)
    needs: regression_v1_10_0
    uses: ./.github/workflows/schema-regression-test.yml
    with:
      path_to_tfscript: tests/regression-test/subscriptions
    secrets: inherit

  collect-and-report:
    name: Collect Results & Report
    runs-on: ubuntu-latest
    needs: [regression_v1_10_0, regression_v1_21_3]
    if: always()

    outputs:
      job_results: ${{ steps.collect.outputs.results }}

    steps:
      - name: Collect job results
        id: collect
        run: |
          echo "results<<EOF" >> $GITHUB_OUTPUT
          echo "v1.10.0: ${{ needs.regression_v1_10_0.result }}" >> $GITHUB_OUTPUT
          echo "v1.21.3: ${{ needs.regression_v1_21_3.result }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  create-or-update-issue:
    name: Create or Update Issue
    needs: collect-and-report
    if: always()
    uses: ./.github/workflows/create-issue-on-failure.yml
    with:
      workflow_name: "Daily Canary Regression"
      job_results: ${{ needs.collect-and-report.outputs.job_results }}
      labels: '["canary","regression"]'
      test_type: "regression"
    secrets: inherit