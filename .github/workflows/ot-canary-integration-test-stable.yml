name: Canary Integration Test (Stable) - OpenTofu Provider

# Idea: 
# 1. Build the provider from the stable version using tofu init
# 2. Setup OpenTofu
# 3. Execute the integration test script on canary landscape
# 4. All changes must apply
# 5. Destroy the infrastructure


on:
  workflow_dispatch:
  workflow_call:

env:
  PATH_TO_TFSCRIPT: 'tests/integration-test'
  TEMP_PLAN_OUTPUT : 'plan-output.tfplan'

permissions:
  contents: read
  issues: write

jobs:
  test:
    name: Canary Integration Test with stable provider
    runs-on: ubuntu-latest

    steps:
    - name: Check out Git repository
      id: checkout_repo
      uses: actions/checkout@v6

    - name: Setup OpenTofu
      id : setup_opentofu
      uses: opentofu/setup-opentofu@v2
      with:
        tofu_wrapper: false
        tofu_version: latest

    - name: Tofu Init with stable provider
      id: tofu_init
      shell: bash
      run: |
        tofu -chdir=${{ env.PATH_TO_TFSCRIPT }} init -no-color

    - name: Tofu Plan with stable provider
      id: tofu_plan_stable
      shell: bash
      run: |
        export BTP_USERNAME=${{ secrets.BTP_USERNAME }}
        export BTP_PASSWORD=${{ secrets.BTP_PASSWORD }}
        export BTP_IDP=${{ secrets.CANARY_BTP_IDP }}
        export BTP_GLOBALACCOUNT=${{ secrets.CANARY_GLOBALACCOUNT }}

        set +e
        tofu -chdir=${{ env.PATH_TO_TFSCRIPT }} plan \
          -var-file=canary.tfvars \
          -out=${{ env.TEMP_PLAN_OUTPUT }} \
          -no-color \
          -detailed-exitcode

        EXIT_CODE=$?
        echo "exitcode=$EXIT_CODE" >> $GITHUB_OUTPUT

        if [ $EXIT_CODE -eq 1 ]; then
          echo "Error during tofu plan execution"
          exit 1
        elif [ $EXIT_CODE -eq 2 ]; then
          echo "Changes detected in tofu plan"
        else
          echo "No changes detected in tofu plan"
        fi

    - name: Tofu Apply with stable provider
      if: steps.tofu_plan_stable.outputs.exitcode == '0' || steps.tofu_plan_stable.outputs.exitcode == '2'
      id: tofu_apply_stable
      shell: bash
      run: |
        export BTP_USERNAME=${{ secrets.BTP_USERNAME }}
        export BTP_PASSWORD=${{ secrets.BTP_PASSWORD }}
        export BTP_IDP=${{ secrets.CANARY_BTP_IDP }}
        export BTP_GLOBALACCOUNT=${{ secrets.CANARY_GLOBALACCOUNT }}

        MAX_RETRIES=3
        RETRY_DELAY=10

        echo "attempts=0" >> $GITHUB_OUTPUT

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Tofu apply attempt $i..."

          tofu -chdir=${{ env.PATH_TO_TFSCRIPT }} apply \
            -auto-approve \
            -no-color \
            ${{ env.TEMP_PLAN_OUTPUT }}

          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "Tofu apply succeeded"
            echo "attempts=$i" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Tofu apply failed with exit code $EXIT_CODE"

          if [ $i -lt $MAX_RETRIES ]; then
            echo "Retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
          fi
        done

        echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
        echo "Tofu apply failed after retries"
        exit 1
    
    - name: Tofu Destroy with stable provider
      if: always()
      id: tofu_destroy_stable
      shell: bash
      run: |
        export BTP_USERNAME=${{ secrets.BTP_USERNAME }}
        export BTP_PASSWORD=${{ secrets.BTP_PASSWORD }}
        export BTP_IDP=${{ secrets.CANARY_BTP_IDP }}
        export BTP_GLOBALACCOUNT=${{ secrets.CANARY_GLOBALACCOUNT }}

        MAX_RETRIES=3
        RETRY_DELAY=10

        echo "attempts=0" >> $GITHUB_OUTPUT

        for i in $(seq 1 $MAX_RETRIES); do
          echo "Tofu destroy attempt $i..."

          tofu -chdir=${{ env.PATH_TO_TFSCRIPT }} destroy \
            -var-file=canary.tfvars \
            -auto-approve \
            -no-color

          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "Tofu destroy succeeded"
            echo "attempts=$i" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Tofu destroy failed with exit code $EXIT_CODE"

          if [ $i -lt $MAX_RETRIES ]; then
            echo "Retrying in $RETRY_DELAY seconds..."
            sleep $RETRY_DELAY
          fi
        done

        echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
        echo "Tofu destroy failed after retries"
        exit 1