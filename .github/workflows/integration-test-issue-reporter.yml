name: Create Issue on Integration Test Failure

on:
  workflow_call:
    inputs:
      workflow_name:
        required: true
        type: string
      job_results:
        required: true
        type: string
      labels:
        required: true
        type: string

permissions:
  issues: write
  contents: read

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@v9
        with:
          script: |
            const results = `${{ inputs.job_results }}`;

            if (!results.includes("failure")) {
              console.log("No failures detected, skipping issue creation.");
              return;
            }

            const labels = JSON.parse(`${{ inputs.labels }}`);

            const title = `${{
              inputs.workflow_name
            }} - Integration Test Failure`;

            const body = `
            ## Integration Test Failed

            **Workflow Group:** ${{ inputs.workflow_name }}

            **Results:**
            ${results}

            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            **Run URL:**
            ${runUrl}

            **Triggered by:** @${{ github.actor }}
            `;

            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const duplicate = existingIssues.find(issue => {
              if (issue.title !== title) return false;
              const existingRunId = issue.body.match(/runs\/(\d+)/)?.[1];
              console.log(`Comparing with issue #${issue.number}, runId: ${existingRunId}`);
              return existingRunId === ${{ github.run_id }};
            });
            if (duplicate) {
              console.log(`Duplicate issue found (#${duplicate.number}), skipping creation.`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels
            });